name: Publish

on:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  # ── Build the React app once on a fast native runner ─────────────────────
  build-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
        env:
          VITE_SITE_MODE: app

      - uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/dist/
          retention-days: 1

  # ── Build each platform's Docker image using the pre-built dist/ ──────────
  docker-build:
    needs: build-app
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ui
            platform: linux/amd64
            runner: ubuntu-latest
          - target: ui
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - target: full
            platform: linux/amd64
            runner: ubuntu-latest
          - target: full
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: app/dist/

      - name: Wait for Docker Hub connectivity
        run: |
          for i in $(seq 1 10); do
            curl -sf --max-time 10 https://registry-1.docker.io/v2/ && echo "Docker Hub reachable" && break
            echo "Attempt $i/10 failed, retrying in 15s..."
            sleep 15
          done

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize platform slug
        id: slug
        run: echo "slug=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: ./app
          file: ./app/Dockerfile.ci
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ secrets.DOCKERHUB_USERNAME }}/storagepilot,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.target }}-${{ steps.slug.outputs.slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-${{ steps.slug.outputs.slug }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.target }}-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge per-platform digests into a multi-arch manifest ─────────────────
  merge:
    needs: docker-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [ui, full]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.target }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/storagepilot
            ghcr.io/${{ github.repository_owner }}/storagepilot
          tags: |
            type=raw,value=${{ matrix.target }},enable=true
            type=raw,value=latest,enable=${{ matrix.target == 'ui' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') && matrix.target == 'ui' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/') && matrix.target == 'ui' }}
            type=semver,pattern={{version}}-${{ matrix.target }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ secrets.DOCKERHUB_USERNAME }}/storagepilot@sha256:%s ' *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect \
            ${{ secrets.DOCKERHUB_USERNAME }}/storagepilot:${{ matrix.target == 'ui' && 'latest' || 'full' }}

  # ── GitHub Release (tags only) ────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: merge
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
