# Usage: docker compose -f docker-compose.stack.yml -f docker-compose.dev.yml up
# Runs Vite dev server with hot reload against separate emulator containers.

services:
  storagepilot:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    entrypoint: []
    command: sh -c "corepack enable && pnpm install && pnpm run dev -- --host 0.0.0.0"
    volumes:
      - ./app:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_GCS_BASE: /api/gcs
      VITE_S3_BASE: /api/s3
      VITE_AZURE_BASE: /api/azure
