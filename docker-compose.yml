name: storagepilot

services:
  storagepilot:
    image: ${STORAGEPILOT_IMAGE:-rinorbardiqi/storagepilot:full}
    pull_policy: never
    build:
      context: ./app
      target: full
    ports:
      # Bind to 127.0.0.1 — on Windows, "localhost" may resolve to IPv6 (::1) and hit
      # a different listener than Docker's 0.0.0.0 publish. Use http://127.0.0.1:3000
      # if localhost hangs.
      - "127.0.0.1:${PORT:-3000}:80"
      - "127.0.0.1:9000:9000"
    volumes:
      - ./data:/data
    environment:
      ENABLED_PROVIDERS: ${ENABLED_PROVIDERS:-gcs,s3,azure}
      MINIO_ROOT_USER: ${MINIO_USER:-storagepilot}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-storagepilot}
    restart: unless-stopped
